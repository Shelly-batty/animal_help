<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退出登录 - 流浪动物救助站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
        } 

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0 20px;
            background: #f8f5f2;
            position: relative;
        }

        .back-btn{
            position: fixed;
            top: 20px;
            left: 20px;
            width: 80px;
            height: 30px;
            color:black;
            background: #8b4513;
            display:flex;
            text-decoration:none;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 999;
            border-radius: 6px;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='/登录背景.png') }}");
            background-size: cover;
            background-position: center;
            opacity: 1; 
            z-index: -1;
        }

        .welcome-card {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: transparent; 
            border: 1px solid rgba(255,255,255,0.4); 
            border-radius: 12px;
            text-align: center;
        }

        .welcome-card h2 {
            color: #8b4513;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .welcome-card p {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .home-btn, .cancel-btn {
            flex: 1;
            height: 46px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .home-btn {
            background: #8b4513;
            color: white;
        }
        .home-btn:hover { 
            background: #5d2d0c; 
        }

        .cancel-btn {
            background: #ccc;
            color: #333;
        }
        .cancel-btn:hover {
            background: #bbb;
        }
    </style>
</head>
<body>
    <a href="{{ url_for('root') }}" class="back-btn">← 返回</a>

    <div class="welcome-card">
        <h2>确定要退出吗？</h2>
        
        <div class="btn-group">
            <button type="submit" class="home-btn" onclick="location.href='/login'">确定</button>
            <button type="submit" class="cancel-btn" onclick="location.href='/login_welcome'">取消</button>
        </div>
    </div>
</body>
</html>
