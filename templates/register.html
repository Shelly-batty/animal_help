<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户注册 - 流浪动物救助站</title>
  <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif
    }

    body {
      position: relative;
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("{{ url_for('static', filename='/登录背景.png') }}");
      background-size: cover;
      background-position: center;
      opacity: 1;
      z-index: -2;
    }

    .container{
        width:90%;
        max-width:600px;
        margin: 80px auto;
    }
    .form-card{
        border:1px solid rgba(255,255,255,0.4);
        border-radius:12px;
        padding:30px;
        background: transparent; 
        box-shadow: none;
    }
    h2{
        color:#8b4513;
        text-align:center;
        margin-bottom:25px
    }
    .form-group{
        margin-bottom:18px
    }
    .form-group label{
        display:block;
        margin-bottom:6px;
        font-weight:bold
    }
    .form-group input,.form-group textarea{
        width:100%;
        padding:10px;
        border:1px solid #ddd;
        border-radius:6px;
        font-size:1rem
    }
    .submit-btn{
        width:100%;
        padding:12px;
        background:#8b4513;
        color:white;
        border:none;
        border-radius:6px;
        font-size:1rem;
        cursor:pointer
    }
    .back-btn{
        position: fixed;
        top: 20px;
        left: 20px;
        width: 80px;
        height: 30px;
        color:black;
        background: #8b4513;
        display:flex;
        text-decoration:none;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        z-index: 999;
        border-radius: 6px; /* 圆角 */
    }
  </style>
</head>
<body>

<div class="container">
  <a href="/login" class="back-btn">← 返回</a>
  <div class="form-card">
    <h2>用户注册</h2>
    <form id="registerForm" method="post" action="/register">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" placeholder="请设置用户名" name="username" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" placeholder="请设置密码" name="password" required>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" placeholder="请再次输入密码" name="password" required>
      </div>
      <div class="form-group">
        <label>真实姓名</label>
        <input type="text" placeholder="请输入真实姓名" name="real_name" required>
      </div>
      <div class="form-group">
        <label>联系电话</label>
        <input type="text" placeholder="请输入手机号" name="phone" required>
      </div>
      <div class="form-group">
        <label>身份证号</label>
        <input type="text" placeholder="请输入18位身份证号码" name="id_card" required>
      </div>
      <div class="form-group">
        <label>家庭地址</label>
        <input type="text" placeholder="请输入详细家庭住址" name="address" required>
      </div>
      <button type="submit" class="submit-btn">立即注册</button>
    </form>
  </div>
</div>

<div class="success-modal" id="successModal">
  <div class="success-content">
    <h3> 注册成功！</h3>
    <p>您的账号已创建完成<br>请返回登录</p>
    <button class="close-success" onclick="closeSuccess()">确定</button>
  </div>
</div>
</body>
</html>
